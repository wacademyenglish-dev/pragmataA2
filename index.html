<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLFSTATION | Pragmata (A2)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        void: '#040B16',
                        panel: '#0B1426',
                        holoCyan: '#00F0FF',
                        alertRed: '#FF003C',
                        lunarWhite: '#F8FAFC',
                        sysGreen: '#39FF14'
                    },
                    fontFamily: {
                        title: ['Rajdhani', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace']
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 20px rgba(0, 240, 255, 0.4)',
                        'neon-red': '0 0 20px rgba(255, 0, 60, 0.5)',
                        'neon-green': '0 0 20px rgba(57, 255, 20, 0.4)',
                    }
                }
            }
        }

    <style>
        /* LUNAR AESTHETIC */
        body { 
            background-color: #040B16; 
            color: #F8FAFC; 
            overflow-x: hidden; 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none; z-index: 9998; opacity: 0.2;
        }

        .hud-panel {
            background: rgba(11, 20, 38, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.15);
        }

        .game-card {
            background: rgba(15, 25, 45, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            position: relative;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .game-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: #00F0FF; opacity: 0.6; border-radius: 4px 0 0 4px;
        }

        /* JIT Vocab Word */
        .jit-word {
            position: relative; display: inline-block; cursor: pointer;
            color: #00F0FF; font-weight: 800; border-bottom: 2px dashed #00F0FF;
            transition: all 0.2s ease; padding-bottom: 2px;
        }
        .jit-word:hover { color: #fff; text-shadow: 0 0 15px #00F0FF; background: rgba(0, 240, 255, 0.1); }
        .jit-word.active { background: #00F0FF; color: #040B16; border-bottom: none; border-radius: 4px; padding: 2px 6px; }

        /* Drills & Buttons */
        .combat-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
        .combat-btn:hover:not(:disabled) { background: rgba(0, 240, 255, 0.1); border-color: #00F0FF; transform: translateY(-2px); box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
        .combat-btn.correct { background: #00F0FF; color: #040B16; font-weight: bold; border-color: #00F0FF; box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
        .combat-btn.wrong { background: #FF003C; color: #FFFFFF; border-color: #FF003C; opacity: 0.6; }

        /* NEW MECHANICS STYLES */
        
        /* M1: Bug Hunter */
        .bug-word { cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.2s; border: 1px solid transparent; display: inline-block; margin: 0 2px; }
        .bug-word:hover:not(.locked) { background: rgba(0, 240, 255, 0.2); border-color: #00F0FF; }
        .bug-word.bug-found { background: rgba(255, 0, 60, 0.4); border-color: #FF003C; color: #fff; text-decoration: line-through; }
        .bug-word.bug-wrong { background: rgba(255, 255, 255, 0.2); opacity: 0.5; }
        
        /* M2: Sentence Builder */
        .build-word { cursor: pointer; transition: all 0.2s; }
        .build-word:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(0,240,255,0.3); }
        .build-slot { min-height: 50px; border: 2px dashed rgba(0,240,255,0.3); transition: all 0.3s; }
        .build-slot.complete-correct { border-style: solid; border-color: #00F0FF; background: rgba(0,240,255,0.1); }
        .build-slot.complete-wrong { border-style: solid; border-color: #FF003C; background: rgba(255,0,60,0.1); }

        /* M3: Terminal Auth */
        .auth-valid:hover:not(:disabled) { background: rgba(57, 255, 20, 0.1); border-color: #39FF14; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); }
        .auth-corrupt:hover:not(:disabled) { background: rgba(255, 0, 60, 0.1); border-color: #FF003C; box-shadow: 0 0 15px rgba(255, 0, 60, 0.3); }

        /* M4: Time Attack */
        .timer-track { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
        .timer-fill { height: 100%; background: #00F0FF; width: 100%; }
        .timer-anim { animation: shrinkBar 8s linear forwards; }
        @keyframes shrinkBar { 
            0% { width: 100%; background: #00F0FF; } 
            50% { background: #FFD700; } 
            100% { width: 0%; background: #FF003C; } 
        }

        /* M6: Slot Machine */
        .slot-btn { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; background: #040B16; border: 2px solid #00F0FF; color: #00F0FF; transition: all 0.1s; user-select: none; }
        .slot-btn:active { transform: scale(0.95); }
        .slot-btn.locked { background: #00F0FF; color: #040B16; pointer-events: none; }

        /* STT Box */
        .stt-box {
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.1) 0%, rgba(0,0,0,0) 100%);
            border-left: 4px solid #00F0FF;
        }

        .drawer { transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1); }

        /* Animations */
        @keyframes glitch { 0% { transform: translate(0) } 25% { transform: translate(-2px, 2px) } 75% { transform: translate(2px, -2px) } 100% { transform: translate(0) } }
        .damage-flash { animation: glitch 0.3s; box-shadow: inset 0 0 60px rgba(255, 0, 60, 0.4) !important; border-color: #FF003C !important; }
        .xp-flash { box-shadow: inset 0 0 60px rgba(0, 240, 255, 0.3) !important; border-color: #00F0FF !important; }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Sliders */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 24px; width: 12px;
            background: #00F0FF; cursor: pointer; margin-top: -10px;
            box-shadow: 0 0 15px #00F0FF; border-radius: 2px;
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #040B16; }
        ::-webkit-scrollbar-thumb { background: #00F0FF; border-radius: 3px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-body antialiased flex flex-col h-screen overflow-hidden selection:bg-holoCyan selection:text-void">

    <div class="scanlines"></div>

    <!-- HUD (WOLFSTATION) -->
    <header class="fixed top-0 w-full z-50 hud-panel px-6 py-4 flex justify-between items-center border-b border-holoCyan/30">

            <i class="fa-solid fa-satellite text-holoCyan text-2xl drop-shadow-neon-cyan animate-pulse"></i>
            <span class="font-title text-3xl tracking-widest text-lunarWhite uppercase">Wolfstation</span>
            <span class="px-2 py-1 text-[10px] font-mono border border-holoCyan text-holoCyan rounded bg-holoCyan/10 hidden md:block">A2</span>
        </div>

    <!-- TACTICAL BOARD (Right) -->

    <!-- LESSON MAP (Left) -->
    <div id="lesson-map" class="fixed left-0 top-0 h-full w-[350px] bg-void border-r border-white/10 z-[6000] -translate-x-full drawer flex flex-col shadow-[20px_0_50px_rgba(0,0,0,0.9)]">
        <div class="p-6 hud-panel flex justify-between items-center border-b border-white/10">
            <div>
                <h2 class="font-title text-3xl tracking-wider text-white uppercase">Mission Log</h2>
                <p class="font-mono text-xs text-gray-500 uppercase tracking-widest mt-1">37 Nodes • A2</p>
            </div>
            <button onclick="toggleDrawer('lesson-map')" class="text-gray-400 hover:text-white"><i class="fa-solid fa-chevron-left text-xl"></i></button>

    <!-- BOTTOM NAV -->
    <footer class="fixed bottom-0 w-full z-50 hud-panel border-t border-holoCyan/30 px-6 py-4 flex justify-between items-center">

    <script>

        let activeTimer = null;
        let builtSentences = {};

        const intelDB = {

            // Grammar
            "going_to": { emoji: "📅", title: "Going To", type: "Grammar", meaning: "Used to talk about a future PLAN or INTENTION.", example: "I am going to Earth.", followUp: "What are you going to do this weekend?" },
            "lets": { emoji: "💡", title: "Let's", type: "Grammar", meaning: "Short for 'Let us'. Used to make a suggestion to do something together.", example: "Let's go together.", followUp: "Make a suggestion! 'Let's...'" }
        };

        const lessonData = [
            // 1. INSTRUCTOR

                            <span class="absolute -top-3 left-6 bg-void px-4 text-holoCyan font-mono text-xs font-bold uppercase tracking-widest border border-holoCyan/30 rounded-full py-1">Teacher Only</span>

                                <p><strong class="text-white">Theme:</strong> Space, escaping danger, AI companions, and moving to a new home.</p>
                                <p><strong class="text-white">Update:</strong> The Drills section is now an interactive "Gauntlet" featuring Time-Attacks, Bug Hunting, Sentence Builders and RPG choices!</p>
                            </div>
                        </div>
                    </div>
                `
            },
            // 2. COVER
            {
                title: "Mission Cover",
                html: `
                    <div class="w-full h-full flex flex-col items-center justify-center text-center px-4 fade-in">
                        <div class="w-full max-w-2xl aspect-video mb-8 rounded-xl shadow-[0_20px_50px_rgba(0,240,255,0.2)] overflow-hidden border border-white/10 relative group">
                            <img src="https://images.unsplash.com/photo-1614729939124-032d0b56c9ce?auto=format&fit=crop&q=80&w=1000" alt="Space" class="absolute inset-0 w-full h-full object-cover z-10 opacity-60">
                            <div class="absolute inset-0 flex flex-col items-center justify-center z-20">

                            </div>
                        </div>
                        <p class="text-gray-400 text-xl mb-8 font-mono uppercase tracking-widest">A New Life on Earth</p>
                        <div class="flex gap-4">
                            <span class="bg-void text-white border border-white/20 px-6 py-2 rounded text-sm font-bold uppercase tracking-widest">A2 Pre-Int</span>
                            <span class="bg-holoCyan/10 text-holoCyan border border-holoCyan/30 px-6 py-2 rounded text-sm font-bold uppercase tracking-widest">Going To / Let's</span>

                `
            },
            // 3-5. WARMUP
            {
                title: "Warmup 1",

            // 6. VOCABULARY INTRO
            {
                title: "Data Decryption",
                html: `

                            <p class="font-body text-2xl leading-relaxed text-gray-200 mb-8">

        // --- NEW MECHANICS LOGIC ---

        // M4: TIME ATTACK
        function startTimer(drillNum, seconds) {
            if(activeTimer) clearTimeout(activeTimer);
            let bar = document.getElementById('timer-bar-' + drillNum);
            let btn1 = document.getElementById('btn' + drillNum + '-1');
            let btn2 = document.getElementById('btn' + drillNum + '-2');
            
            // Reset state in case they navigate back
            if(bar) {
                bar.style.animation = 'none';
                void bar.offsetWidth; // trigger reflow
                bar.classList.add('timer-anim');
            }
            
            activeTimer = setTimeout(() => {
                // If they didn't click
                if(btn1 && !btn1.disabled) {
                    takeDamage(20);
                    let drillDiv = document.getElementById('drill-' + drillNum);
                    drillDiv.classList.add('damage-flash');
                    setTimeout(() => drillDiv.classList.remove('damage-flash'), 400);
                    
                    btn1.disabled = true; btn2.disabled = true;
                    btn1.style.opacity = '0.3'; btn2.style.opacity = '0.3';
                    
                    let fb = document.getElementById('fb-' + drillNum);
                    if(fb) {
                        fb.classList.remove('hidden');
                        fb.querySelector('p').innerText = "SYSTEM TIMEOUT";
                        fb.querySelector('p').classList.replace('text-holoCyan', 'text-alertRed');
                    }
                }
            }, seconds * 1000);
        }

        function checkTimeAttack(btn, isCorrect, num) {
            if(activeTimer) clearTimeout(activeTimer);
            let bar = document.getElementById('timer-bar-' + num);
            if(bar) { bar.style.animationPlayState = 'paused'; } // stop visual timer
            
            const btns = btn.parentElement.querySelectorAll('button');
            btns.forEach(b => { b.disabled = true; if(b !== btn) b.style.opacity = '0.3'; });
            
            if (isCorrect) {
                btn.classList.add('correct');
                gainXP(30);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
            } else {
                btn.classList.add('wrong');
                takeDamage(20);
                setTimeout(() => {
                    btns.forEach(b => { if(!b.classList.contains('wrong')){ b.disabled = false; b.style.opacity = '1'; } });
                    if(bar) bar.style.animationPlayState = 'running';
                    // restart timer for remaining time? For simplicity, we just let them try again without timer
                }, 600);
            }
        }

        // M3: TERMINAL AUTH
        function checkAuth(btn, isValidSyntax, num) {
            const btns = btn.parentElement.querySelectorAll('button');
            btns.forEach(b => { b.disabled = true; if(b !== btn) b.style.opacity = '0.3'; });

            if (isValidSyntax) {
                // They correctly identified if it was valid or corrupt
                btn.classList.add('correct'); // reuse correct style, or just let their native hover style stick
                btn.style.background = btn.classList.contains('auth-valid') ? 'rgba(57, 255, 20, 0.2)' : 'rgba(255, 0, 60, 0.2)';
                gainXP(20);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
            } else {
                btn.classList.add('wrong');
                takeDamage(15);
                setTimeout(() => {
                    btns.forEach(b => { if(!b.classList.contains('wrong')){ b.disabled = false; b.style.opacity = '1'; } });
                }, 600);
            }
        }

        // M2: SENTENCE BUILDER
        function initBuilder(num, wordsArray) {
            builtSentences[num] = [];
            let bank = document.getElementById('bank-' + num);
            let zone = document.getElementById('build-zone-' + num);
            let checkBtn = document.getElementById('btn-check-' + num);
            
            zone.innerHTML = '';
            checkBtn.classList.add('opacity-50', 'pointer-events-none');

            // Shuffle array
            wordsArray.sort(() => Math.random() - 0.5);
            
            bank.innerHTML = wordsArray.map((w, i) => 
                `<button id="word-${num}-${i}" onclick="addToBuilder('${w}', ${num}, this.id)" class="build-word bg-panel border border-holoCyan/50 text-white px-4 py-2 rounded font-mono shadow-neon-cyan">${w}</button>`
            ).join('');
        }

        function addToBuilder(word, num, btnId) {
            builtSentences[num].push(word);
            document.getElementById(btnId).style.visibility = 'hidden'; // Hide original
            
            let zone = document.getElementById('build-zone-' + num);
            
            // Create a button in the zone that can be clicked to remove it
            let newBtn = document.createElement('button');
            newBtn.className = "bg-holoCyan text-black px-4 py-2 rounded font-mono font-bold";
            newBtn.innerText = word;
            newBtn.onclick = function() {
                // Remove from array
                let idx = builtSentences[num].lastIndexOf(word);
                if(idx > -1) builtSentences[num].splice(idx, 1);
                // Remove from zone
                zone.removeChild(this);
                // Show original
                document.getElementById(btnId).style.visibility = 'visible';
                
                document.getElementById('btn-check-' + num).classList.add('opacity-50', 'pointer-events-none');
                zone.classList.remove('complete-correct', 'complete-wrong');
            };
            
            zone.appendChild(newBtn);

            // Enable check button if all words are used (checking length of original bank)
            let bankTotal = document.getElementById('bank-' + num).children.length;
            if(builtSentences[num].length === bankTotal) {
                document.getElementById('btn-check-' + num).classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        function checkBuilder(num, correctSentence) {
            let currentSentence = builtSentences[num].join(" ");
            let zone = document.getElementById('build-zone-' + num);
            
            if(currentSentence === correctSentence) {
                zone.classList.add('complete-correct');
                zone.classList.remove('complete-wrong');
                gainXP(40);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
                
                // Disable all words in zone
                Array.from(zone.children).forEach(c => c.onclick = null);
                document.getElementById('btn-check-' + num).style.display = 'none';
            } else {
                zone.classList.add('complete-wrong');
                takeDamage(15);
                let drillDiv = document.getElementById(`drill-${num}`);
                drillDiv.classList.add('damage-flash');
                setTimeout(() => {
                    drillDiv.classList.remove('damage-flash');
                    zone.classList.remove('complete-wrong');
                }, 500);
            }
        }

        // M6: SLOT MACHINE
        let slotData = {};
        function cycleSlot(btnId, arrayWords) {
            if(!slotData[btnId]) slotData[btnId] = 0;
            slotData[btnId]++;
            if(slotData[btnId] >= arrayWords.length) slotData[btnId] = 0;
            
            document.getElementById(btnId).innerText = arrayWords[slotData[btnId]];
        }

        function checkSlot(btnId, correctWord, num) {
            let btn = document.getElementById(btnId);
            if(btn.innerText === correctWord) {
                btn.classList.add('locked');
                document.getElementById('lock-' + num).style.display = 'none';
                gainXP(20);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
            } else {
                takeDamage(15);
                let drillDiv = document.getElementById(`drill-${num}`);
                drillDiv.classList.add('damage-flash');
                setTimeout(() => drillDiv.classList.remove('damage-flash'), 500);
            }
        }

        // M1: BUG HUNTER
        function checkBug(el, isBug, num) {
            if(el.parentElement.classList.contains('locked')) return; // already solved

            if(isBug) {
                el.classList.add('bug-found');
                el.parentElement.classList.add('locked'); // lock container
                
                // Dim other words
                Array.from(el.parentElement.children).forEach(child => {
                    if(child !== el) child.classList.add('bug-wrong');
                });

                gainXP(30);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
            } else {
                takeDamage(10);
                let drillDiv = document.getElementById(`drill-${num}`);
                drillDiv.classList.add('damage-flash');
                setTimeout(() => drillDiv.classList.remove('damage-flash'), 400);
            }
        }


        // --- NARRATIVE RPG LOGIC (unchanged) ---
        const narrativeNodes = {
            start: {
                text: "The moon base is falling apart. You see a small robot broken on the floor. It says 'Help me'. What are you going to do?",
                choices: [
                    { label: "LEAVE IT", text: "I am going to run away. It's just a machine.", next: "leave" },
                    { label: "TAKE IT", text: "Let's take it with us to Earth.", next: "take" }
                ]
            },
            leave: {
                text: "You run alone to the ship. A monster attacks you because you didn't have the robot's shield! (-30 HP)",
                isEnd: true,
                stt: "Why is it important to help others?",
                action: () => { takeDamage(30); }
            },
            take: {
                text: "You take the robot. It creates a shield that protects you from the falling rocks! You are safe. (+50 XP)",
                isEnd: true,
                stt: "Would you trust an AI robot in real life?",
                action: () => { gainXP(50); }
            }
        };

        function playNarrative(nodeId) {
            const container = document.getElementById('narrative-gameplay');
            const node = narrativeNodes[nodeId];

            if (node.isEnd) {
                container.innerHTML = `
                    <div class="text-center fade-in flex flex-col h-full justify-center">
                        <i class="fa-solid fa-flag-checkered text-6xl text-holoCyan mb-8 animate-pulse drop-shadow-neon-cyan"></i>
                        <h3 class="font-title text-4xl text-white mb-6 tracking-widest uppercase">RESULT</h3>
                        <p class="text-2xl text-gray-300 font-body leading-relaxed max-w-2xl mx-auto border-l-4 border-holoCyan pl-6">${node.text}</p>
                        
                        <div class="mt-12 bg-white/5 border border-white/10 p-6 rounded-lg text-left w-full">
                            <span class="text-xs font-mono text-cyan-400 block mb-2 uppercase tracking-widest">> Follow-up Discussion:</span>
                            <p class="text-xl text-white italic font-body">"${node.stt}"</p>
                        </div>
                    </div>
                `;
                if(node.action) node.action();
            } else {
                let buttonsHTML = node.choices.map(c => `
                    <button onclick="playNarrative('${c.next}')" class="flex flex-col items-center justify-center p-8 border border-white/10 bg-panel hover:bg-white/5 hover:border-holoCyan transition-all group gap-6 rounded-xl w-full">
                        <div class="text-center mt-auto">
                            <span class="font-title text-3xl text-white block mb-2 tracking-widest uppercase group-hover:text-holoCyan transition-colors">${c.label}</span>
                            <span class="text-base font-body text-gray-400 italic px-4">"${c.text}"</span>
                        </div>
                    </button>
                `).join('');

                container.innerHTML = `
                    <div class="fade-in flex flex-col h-full">
                        <p class="font-body text-2xl md:text-3xl text-white mb-12 leading-relaxed border-l-4 border-holoCyan pl-8">${node.text}</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-auto">
                            ${buttonsHTML}
                        </div>
                    </div>
                `;
            }
        }

        // --- 3. ENGINE LOGIC ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function updateHUD() {
            document.getElementById('hp-text').innerText = state.hp;
            document.getElementById('hp-bar').style.width = state.hp + "%";
            document.getElementById('xp-text').innerText = state.xp;
        }

        function takeDamage(amount) {
            state.hp = Math.max(0, state.hp - amount);
            updateHUD();
            document.body.classList.add('damage-flash');
            setTimeout(() => document.body.classList.remove('damage-flash'), 400);
            if (state.hp <= 0) { 
                alert("Game Over! Out of Oxygen."); 
                location.reload(); 
            }
        }

        function gainXP(amount) { state.xp += amount; updateHUD(); }

        function renderMap() {
            const container = document.getElementById('map-nodes');
            container.innerHTML = lessonData.map((step, i) => {
                let color = i === state.current ? 'text-holoCyan font-bold' : (i < state.current ? 'text-white' : 'text-gray-500');
                return `
                <div class="flex items-center justify-between p-3 rounded cursor-pointer hover:bg-white/5 transition-colors" onclick="jumpTo(${i})">
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-mono w-4 text-right ${i === state.current ? 'text-holoCyan' : 'text-gray-500'}">${i + 1}</span>
                        <span class="text-sm font-body ${color}">${step.title}</span>
                    </div>
                    ${i === state.current ? '<i class="fa-solid fa-play text-holoCyan text-xs"></i>' : ''}
                </div>
            `}).join('');
        }

        function renderStep() {
            closeJIT();
            if(activeTimer) clearTimeout(activeTimer); // Clear any running timers

            const stage = document.getElementById('engine-stage');
            stage.innerHTML = lessonData[state.current].html;
            
            let displayNum = state.current + 1;
            document.getElementById('current-step-display').innerText = displayNum < 10 ? `0${displayNum}` : displayNum;
            document.getElementById('btn-prev').disabled = state.current === 0;
            document.getElementById('btn-next').disabled = state.current === lessonData.length - 1;
            
            if (lessonData[state.current].onLoad) lessonData[state.current].onLoad();
            renderMap();
            updateHUD();
        }

        function nextStep() { if (state.current < lessonData.length - 1) { state.current++; renderStep(); } }
        function prevStep() { if (state.current > 0) { state.current--; renderStep(); } }
        function jumpTo(idx) { state.current = idx; renderStep(); toggleDrawer('lesson-map'); }

        function toggleDrawer(id) {
            const drawers = ['lesson-map', 'jit-panel', 'tactical-board'];
            drawers.forEach(drawerId => {
                const drawer = document.getElementById(drawerId);
                if (!drawer) return;
                
                if (drawerId === id) {
                    if (drawer.classList.contains('translate-x-full') || drawer.classList.contains('-translate-x-full')) {
                        drawer.classList.remove('translate-x-full', '-translate-x-full');
                    } else {
                        if (id === 'lesson-map') drawer.classList.add('-translate-x-full');
                        else drawer.classList.add('translate-x-full');
                    }
                } else {
                    if (drawerId === 'lesson-map') drawer.classList.add('-translate-x-full');
                    else drawer.classList.add('translate-x-full');
                }
            });
        }

        function clearNotes() {
            document.getElementById('t-notes').value = '';
            document.getElementById('t-notes').focus();
        }

        function revealIntel(key, el = null) {
            const data = intelDB[key];
            if (!data) return;
            
            if (el) {
                document.querySelectorAll('.jit-word').forEach(r => r.classList.remove('active'));
                el.classList.add('active');
            }
            
            document.getElementById('jit-content').innerHTML = `
                <div class="flex flex-col items-center text-center mb-8 fade-in">
                    <span class="text-7xl mb-6 drop-shadow-lg">${data.emoji}</span>
                    <h2 class="font-title tracking-widest text-4xl text-white mb-2 drop-shadow-md">${data.title}</h2>
                    <span class="text-holoCyan font-mono text-xs uppercase tracking-widest">${data.type}</span>
                </div>
                <div class="mb-6 slide-up">
                    <p class="text-gray-400 text-xs uppercase font-mono tracking-widest mb-2">Meaning</p>
                    <p class="text-white text-xl font-body leading-relaxed">${data.meaning}</p>
                </div>
                <div class="bg-black/50 p-6 rounded-xl slide-up border-l-2 border-holoCyan" style="animation-delay: 0.1s">
                    <p class="text-holoCyan text-xs uppercase font-mono tracking-widest mb-2">Subtitle</p>
                    <p class="text-white text-lg italic font-body">"${data.example}"</p>
                </div>
                ${data.followUp ? `
                <div class="stt-box p-6 mt-6 bg-white/5 rounded-xl shadow-lg slide-up" style="animation-delay: 0.2s">
                    <span class="text-xs text-holoCyan uppercase font-mono tracking-widest mb-2 block">Speak:</span>
                    <p class="text-white text-base font-body italic">"${data.followUp}"</p>
                </div>
                ` : ''}
            `;
            document.getElementById('intel-panel').classList.remove('translate-x-full');
        }
        
        function closeJIT() { 
            document.getElementById('jit-panel').classList.add('translate-x-full'); 
            document.querySelectorAll('.jit-word').forEach(r => r.classList.remove('active'));
        }

        // Standard Combat (kept for Dialogue Wheel)
        function checkCombat(btn, isCorrect, num) {
            const btns = btn.parentElement.querySelectorAll('.combat-btn');
            btns.forEach(b => { b.disabled = true; if(b !== btn) b.style.opacity = '0.3'; });
            
            if (isCorrect) {
                btn.classList.add('correct');
                gainXP(20);
                document.getElementById(`drill-${num}`).classList.add('xp-flash');
                setTimeout(() => document.getElementById(`drill-${num}`).classList.remove('xp-flash'), 500);
                document.getElementById(`fb-${num}`).classList.remove('hidden');
            } else {
                btn.classList.add('wrong');
                takeDamage(15);
                setTimeout(() => {
                    btns.forEach(b => { if(!b.classList.contains('wrong')){ b.disabled = false; b.style.opacity = '1'; } });
                }, 600);
            }
        }

        window.onload = renderStep;
    </script>
</body>
</html>
